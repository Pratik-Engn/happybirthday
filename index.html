<!DOCTYPE html>
<html>
<head>
  <title>Countdown Siya </title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: 'Courier New', monospace;
      text-align: center;
      overflow: hidden;
      cursor: url("cat.png"), auto;  /* Put your cat PNG in repo */
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    h1 {
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 28px;
      margin-bottom: 20px;
    }

    #countdown {
      font-size: 34px;
      margin-bottom: 25px;
    }

    .gif-container img {
      width: 220px;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>
    System loading...<br>
    Preparing something meaningful.
    Beauty sleep more important as of now...
  </h1>

  <div id="countdown"></div>

  <div class="gif-container">
    <img src="vivi.gif" alt="Sleeping">
  </div>
</div>

<canvas id="snow"></canvas>

<script>
  // COUNTDOWN
  var countDate = new Date("June 17, 2026 00:00:00").getTime();

  var x = setInterval(function() {
    var now = new Date().getTime();
    var distance = countDate - now;

    var days = Math.floor(distance / (1000 * 60 * 60 * 24));
    var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    var seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
      days + "d " + hours + "h " + minutes + "m " + seconds + "s";

    if (distance < 0) {
      clearInterval(x);
      window.location.href = "birthday.html";
    }
  }, 1000);


  // SNOW EFFECT
  const canvas = document.getElementById("snow");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const snowflakes = [];

  for (let i = 0; i < 120; i++) {
    snowflakes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      radius: Math.random() * 3 + 1,
      speed: Math.random() * 0.7 + 0.3
    });
  }

  function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for (let i = 0; i < snowflakes.length; i++) {
      let f = snowflakes[i];
      ctx.moveTo(f.x, f.y);
      ctx.arc(f.x, f.y, f.radius, 0, Math.PI * 2, true);
    }

    ctx.fill();
    moveSnow();
  }

  function moveSnow() {
    for (let i = 0; i < snowflakes.length; i++) {
      let f = snowflakes[i];
      f.y += f.speed;

      if (f.y > canvas.height) {
        f.y = 0;
        f.x = Math.random() * canvas.width;
      }
    }
  }

  setInterval(drawSnow, 25);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 🤍</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    background: linear-gradient(to bottom, #fdf6f0, #f8efe6);
    text-align: center;
    color: #333;
    overflow-x: hidden;
}

/* Cat Cursor */
body {
    cursor: url('cat.png'), auto;
}

.container {
    padding: 40px 20px;
}

h1 {
    font-size: 3rem;
    margin-bottom: 10px;
}

.countdown {
    font-size: 2rem;
    margin-top: 20px;
}

.hidden {
    display: none;
}

.gallery img {
    width: 80%;
    max-width: 500px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.fade {
    animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<div class="container">

    <!-- COUNTDOWN SECTION -->
    <div id="countdownSection">
        <h1>Something Special Is Coming 🤍</h1>
        <p>A small calm space… just wait.</p>
        <div class="countdown" id="countdown"></div>
    </div>

    <!-- BIRTHDAY SECTION -->
    <div id="birthdaySection" class="hidden fade">
        <h1>Happy Birthday 🤍</h1>
        <p>
            A small corner of the internet made just for you.
            No noise. Just memories.
        </p>

        <div class="gallery">
            <img src="photos/photo1.jpg">
            <img src="photos/photo2.jpg">
            <img src="photos/photo3.jpg">
        </div>

        <p>
            A little high-adrenaline dream sequence in my head —
            mountains, calm evenings, books, and peace.
        </p>

        <p>
            Thank you for being you.
        </p>
    </div>

</div>

<script>

// 🔥 SET BIRTHDAY DATE HERE
const birthday = new Date("February 17, 2026 00:00:00").getTime();

const countdownElement = document.getElementById("countdown");
const countdownSection = document.getElementById("countdownSection");
const birthdaySection = document.getElementById("birthdaySection");

const interval = setInterval(function() {

    const now = new Date().getTime();
    const distance = birthday - now;

    if (distance < 0) {
        clearInterval(interval);
        countdownSection.classList.add("hidden");
        birthdaySection.classList.remove("hidden");
        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    countdownElement.innerHTML =
        days + "d " +
        hours + "h " +
        minutes + "m " +
        seconds + "s ";

}, 1000);

</script>

</body>
</html>

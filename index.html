<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Sia</title>

<style>
body {
    margin: 0;
    background: black;
    color: white;
    font-family: Georgia, serif;
    text-align: center;
    overflow: hidden;
}

/* Center Content */
#center {
    position: absolute;
    top: 35%;
    width: 100%;
}

/* Sleeping GIF */
#sleepGif {
    width: 220px;
    margin-bottom: 20px;
}

/* Text */
#message {
    font-size: 22px;
    letter-spacing: 1px;
    font-weight: 300;
}

/* Countdown */
#countdown {
    font-size: 40px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div id="center">
    <img src="./Vivi.gif" id="sleepGif">
    <div id="message">Let me sleep until...</div>
    <div id="countdown"></div>
</div>

<script>

/* SET TARGET DATE */
const targetDate = new Date("February 17, 2026 00:00:00").getTime();

/* Change to past date to test */

setInterval(function() {

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("countdown").innerHTML =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s";

}, 1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Happy Birthday Siyaaa</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    padding: 0;
    font-family: 'Georgia', serif;
    background: #0b0f1a;
    color: white;
    overflow-x: hidden;
    cursor: url("cat.png"), auto; /* Your cat PNG */
}

/* ===== BACKGROUND IMAGE ===== */
.background-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: url("background.jpg") center center / cover no-repeat;
    z-index: -2;
    opacity: 0.25;
}

/* ===== DANDELION EFFECT ===== */
.dandelion {
    position: fixed;
    top: -20px;
    color: rgba(255,255,255,0.8);
    font-size: 20px;
    animation: fall linear infinite;
    z-index: -1;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* ===== TITLE ===== */
.title {
    text-align: center;
    font-size: 70px;
    margin-top: 60px;
    letter-spacing: 2px;
    font-weight: 400;
}

/* ===== MAIN SECTION ===== */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-top: 60px;
    padding: 20px;
    flex-wrap: wrap;
}

/* ===== PHOTO FRAME ===== */
.photo-frame {
    padding: 20px;
    border-radius: 30px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.main-photo {
    width: 500px;
    max-width: 90%;
    border-radius: 20px;
    display: block;
}

/* ===== WISH TEXT ===== */
.wish-text {
    max-width: 450px;
    font-size: 22px;
    line-height: 1.7;
    font-weight: 300;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .title {
        font-size: 45px;
    }

    .container {
        flex-direction: column;
        gap: 30px;
    }

    .wish-text {
        text-align: center;
    }
}

</style>
</head>

<body>

<div class="background-wrapper"></div>

<h1 class="title">Happy Birthday Siyaaa</h1>

<div class="container">

    <div class="photo-frame">
        <img src="mainphoto.jpg" class="main-photo">
    </div>

    <div class="wish-text">
        <p>
            Wish you a very happy birthday.  
            I genuinely hope this year brings you peace, clarity,  
            success, and everything that aligns with your heart.
        </p>
        <p>
            May your world stay calm, your mind stay strong,  
            and your smile stay exactly the way it is.
        </p>
    </div>

</div>

<script>

/* ===== DANDELION GENERATOR ===== */
function createDandelion() {
    const d = document.createElement("div");
    d.classList.add("dandelion");
    d.innerHTML = "✿";

    d.style.left = Math.random() * window.innerWidth + "px";
    d.style.animationDuration = (6 + Math.random() * 6) + "s";
    d.style.fontSize = (15 + Math.random() * 15) + "px";

    document.body.appendChild(d);

    setTimeout(() => {
        d.remove();
    }, 12000);
}

setInterval(createDandelion, 400);

</script>

</body>
</html>

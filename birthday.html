<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎂 Happy Birthday Siyaa </title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: url("background.jpg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  cursor: url("cat.png"), auto;
  overflow: hidden;
}

/* Dark overlay */
.overlay {
  background: rgba(0,0,0,0.65);
  min-height: 100vh;
  padding: 60px 40px;
}

/* Title */
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 78px;
  text-align: center;
  margin-bottom: 20px;
  letter-spacing: 2px;
  background: linear-gradient(to right, #ffffff, #dcdcdc, #ffffff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: fadeIn 2s ease forwards;
}
<p class="subtitle">17th February</p>
.subtitle {
  text-align: center;
  font-size: 18px;
  opacity: 0.7;
  margin-bottom: 50px;
  letter-spacing: 4px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.content {
  animation: fadeIn 4.5s ease forwards;
}


/* Main content layout */
.content {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 60px;
  max-width: 1100px;
  margin: auto;
  flex-wrap: wrap;
}

/* Photo frame */
.photo-frame {
  padding: 15px;
  background: rgba(255,255,255,0.1);
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 16px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.7);
}

.photo-frame img {
  width: 420px;
  border-radius: 12px;
  display: block;
}

/* Message */
.message {
  max-width: 450px;
  font-size: 20px;
  line-height: 1.9;
  opacity: 0.95;
}

.message strong {
  font-size: 24px;
}

/* Dandelions */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.overlay > * {
  position: relative;
  z-index: 2;
}

</style>
</head>

<body>

<div class="overlay">

  <h1>Happy Birthday Siyaa </h1>

  <div class="content">

    <div class="photo-frame">
      <img src="mainphoto.jpg">
    </div>

    <div class="message">
      <strong>Wish you a very happy birthday.</strong><br><br>
      May this year bring you clarity, strength, growth, and quiet peace in everything you choose to do.  
      May you continue to become stronger, calmer, and more unstoppable in your own way.  
      Stay exactly the way you are — grounded, genuine, steady.
    </div>

  </div>

</div>

<canvas id="petals"></canvas>

<script>
const canvas = document.getElementById("petals");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let petals = [];

for (let i = 0; i < 35; i++) {
  petals.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 3 + 1,
    speedY: Math.random() * 0.6 + 0.3,
    speedX: Math.random() * 0.4 - 0.2
  });
}

function drawPetals() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.beginPath();

  petals.forEach(p => {
    ctx.moveTo(p.x, p.y);
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  });

  ctx.fill();
  movePetals();
}

function movePetals() {
  petals.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(drawPetals, 30);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎂 Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: url("background.jpg") no-repeat center center fixed;
  background-size: cover;
  color: white;
  cursor: url("cat.png"), auto;
  overflow: hidden;
}

.overlay {
  background: rgba(0,0,0,0.65);
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  margin-bottom: 25px;
}

.hero-img {
  width: 340px;
  border-radius: 14px;
  margin: 25px 0;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

p {
  font-size: 18px;
  max-width: 550px;
  line-height: 1.8;
  opacity: 0.95;
}

/* Dandelions */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

.overlay > * {
  position: relative;
  z-index: 2;
}

</style>
</head>

<body>

<div class="overlay">

  <h1>Happy Birthday</h1>

  <img src="mainphoto.jpg" class="hero-img">

  <p>
    Wish you a very happy birthday.  
    May this year bring you clarity, strength, growth, and quiet peace in everything you choose to do.  
    Stay the way you are — grounded, genuine, and steady.
  </p>

</div>

<canvas id="petals"></canvas>

<script>
const canvas = document.getElementById("petals");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let petals = [];

for (let i = 0; i < 35; i++) {
  petals.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 3 + 1,
    speedY: Math.random() * 0.6 + 0.3,
    speedX: Math.random() * 0.4 - 0.2
  });
}

function drawPetals() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.beginPath();

  petals.forEach(p => {
    ctx.moveTo(p.x, p.y);
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  });

  ctx.fill();
  movePetals();
}

function movePetals() {
  petals.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(drawPetals, 30);
</script>

</body>
</html>

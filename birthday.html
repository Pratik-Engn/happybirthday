<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🎂 Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background: url("background.jpg") no-repeat center center fixed;
  background-size: cover;
  cursor: url("cat.png"), auto;
  overflow-x: hidden;
}

/* Overlay */
.overlay {
  background: rgba(0,0,0,0.65);
  min-height: 100vh;
  padding-bottom: 80px;
  animation: fadeIn 1.2s ease-in-out;
}

/* Fade Animation */
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Hero */
.hero {
  text-align: center;
  padding: 100px 20px 40px 20px;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: 54px;
  letter-spacing: 3px;
  margin-bottom: 15px;
  font-weight: 700;
}

.hero p {
  font-size: 18px;
  max-width: 600px;
  margin: auto;
  line-height: 1.8;
  font-weight: 300;
  opacity: 0.9;
}

/* Three Photos */
.three-photos {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin: 70px 20px;
  flex-wrap: wrap;
}

.three-photos img {
  width: 320px;
  border-radius: 12px;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.three-photos img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

/* Memories */
.memories {
  text-align: center;
  margin-top: 90px;
}

.memories h2 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 40px;
  letter-spacing: 2px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 0 50px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.gallery img:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,255,255,0.25);
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  padding-top: 80px;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.95);
}

.modal-content {
  margin: auto;
  display: block;
  max-width: 80%;
  animation: zoom 0.3s ease;
}

@keyframes zoom {
  from {transform: scale(0.8);}
  to {transform: scale(1);}
}

/* Dandelion Canvas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 0;
}

.overlay > * {
  position: relative;
  z-index: 1;
}

</style>
</head>

<body>

<div class="overlay">

  <div class="hero">
    <h1>Happy Birthday</h1>
    <p>
      Wish you a very happy birthday.
      Wishing you clarity, growth, success and peace in everything you do.
    </p>
  </div>

  <div class="three-photos">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <img src="photo3.jpg">
  </div>

  <div class="memories">
    <h2>Memories</h2>
    <div class="gallery">
      <img src="mem1.jpg" onclick="openModal(this.src)">
      <img src="mem2.jpg" onclick="openModal(this.src)">
      <img src="mem3.jpg" onclick="openModal(this.src)">
    </div>
  </div>

</div>

<div id="myModal" class="modal" onclick="closeModal()">
  <img class="modal-content" id="modalImg">
</div>

<canvas id="petals"></canvas>

<script>

/* Modal */
function openModal(src) {
  document.getElementById("myModal").style.display = "block";
  document.getElementById("modalImg").src = src;
}
function closeModal() {
  document.getElementById("myModal").style.display = "none";
}

/* Dandelion Effect */
const canvas = document.getElementById("petals");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let petals = [];

for (let i = 0; i < 40; i++) {
  petals.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    radius: Math.random() * 3 + 1,
    speedY: Math.random() * 0.7 + 0.3,
    speedX: Math.random() * 0.5 - 0.25
  });
}

function drawPetals() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "rgba(255,255,255,0.8)";
  ctx.beginPath();

  petals.forEach(p => {
    ctx.moveTo(p.x, p.y);
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
  });

  ctx.fill();
  movePetals();
}

function movePetals() {
  petals.forEach(p => {
    p.y += p.speedY;
    p.x += p.speedX;

    if (p.y > canvas.height) {
      p.y = 0;
      p.x = Math.random() * canvas.width;
    }
  });
}

setInterval(drawPetals, 30);

</script>

</body>
</html>
